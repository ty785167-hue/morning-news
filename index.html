<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Briefing Desk - Sanmei Accurate</title>
    <style>
        :root { --accent: #ffd700; --card-bg: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; padding: 10px; line-height: 1.5; min-height: 100vh; transition: background 3s ease; color: #fff; background: #050a14; }
        body.day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #003366; }
        body.twilight { background: linear-gradient(180deg, #fa709a 0%, #fee140 100%); color: #4a0000; }
        body.night { background: linear-gradient(180deg, #050a14 0%, #1a2a44 100%); color: #ffffff; }
        .container { max-width: 800px; margin: 0 auto; }
        header { position: relative; padding: 50px 0 20px; text-align: center; }
        #celestial-body { position: absolute; left: 50%; transform: translateX(-50%); font-size: 60px; transition: all 3s ease; z-index: 0; }
        .info-panel { position: relative; z-index: 1; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .temp-main { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .astro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.8rem; margin-top: 10px; opacity: 0.9; }

        /* 位相法 占いエリア */
        .fortune-area { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--accent); color: #fff; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .fortune-title { font-size: 0.9rem; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 8px; margin-bottom: 15px; text-align: center; letter-spacing: 2px; }
        .fortune-item { margin-bottom: 14px; font-size: 0.9rem; }
        .fortune-label { font-weight: bold; color: var(--accent); display: block; font-size: 0.75rem; margin-bottom: 3px; opacity: 0.9; }
        .fortune-text { line-height: 1.7; }
        .summary-box { background: rgba(255, 215, 0, 0.1); padding: 12px; border-radius: 8px; border: 1px dashed var(--accent); text-align: center; font-weight: bold; margin-top: 15px; }

        .category-nav { display: flex; overflow-x: auto; gap: 8px; padding: 15px 0; scrollbar-width: none; }
        .category-nav::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 10px 20px; border-radius: 25px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: inherit; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .tab.active { background: #fff; color: #000; border-color: #fff; }
        .news-container { display: none; }
        .news-container.active { display: block; }
        .news-card { background: rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; margin-bottom: 10px; text-decoration: none; color: inherit; display: block; border: 1px solid var(--border); }
        .news-card:hover { background: rgba(255, 255, 255, 0.2); }
        .news-meta { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-weight: bold; }
        footer { text-align: center; font-size: 0.7rem; padding: 40px 0; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="celestial-body">☀️</div>
        <div class="info-panel">
            <div id="display-date" style="font-size: 1.1rem; font-weight: bold;">--月--日</div>
            <div class="temp-main"><span id="temp">--</span>°C <span id="weather-icon">--</span></div>
            <div id="weather-text" style="font-size: 0.9rem;">天候を読み込み中...</div>
            <div class="astro-grid">
                <div>🌅 Sunrise: <span id="sunrise-time">--:--</span></div>
                <div>🌇 Sunset: <span id="sunset-time">--:--</span></div>
            </div>
        </div>
    </header>

    <div class="fortune-area">
        <div class="fortune-title">位相法リーディング (1979.11.30 男性)</div>
        
        <div class="fortune-item"><span class="fortune-label">1. 今日の干支</span><div id="f-today" class="fortune-text" style="font-weight:bold; font-size:1.1rem;"></div></div>
        <div class="fortune-item"><span class="fortune-label">2. 命式側の干支</span><div class="fortune-text">日:辛未 / 月:乙亥 / 年:己未</div></div>
        <div class="fortune-item"><span class="fortune-label">3. 成立している位相法</span><div id="f-relation" class="fortune-text"></div></div>
        <div class="fortune-item"><span class="fortune-label">4. 位相法の意味</span><div id="f-meaning" class="fortune-text"></div></div>
        <div class="fortune-item"><span class="fortune-label">5. 今日のテーマ</span><div id="f-theme" class="fortune-text"></div></div>
        <div class="fortune-item"><span class="fortune-label">6. 今日やると良いこと</span><div id="f-good" class="fortune-text"></div></div>
        <div class="fortune-item"><span class="fortune-label">7. 注意点</span><div id="f-warn" class="fortune-text"></div></div>
        
        <div class="summary-box">
            <span class="fortune-label">8. ひと言まとめ</span>
            <div id="f-summary"></div>
        </div>
    </div>

    <div style="text-align:center;"><button onclick="refreshAll()" id="update-btn" style="background:none; border:1px solid currentColor; color:inherit; padding:8px 25px; border-radius:20px; cursor:pointer; font-size:0.9rem; font-weight:bold;">情報を更新</button></div>

    <div class="category-nav" id="tab-list"></div>
    <div id="news-content"></div>

    <footer>
        命式: 己未・乙亥・辛未 (1979.11.30)<br>
        2000-01-01 (戊午) Anchor Calculation
    </footer>
</div>

<script>
    const KAN = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
    const SHI = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    const KANSHI = [];
    for(let i=0; i<60; i++) KANSHI.push(KAN[i%10] + SHI[i%12]);

    const CATEGORIES = [
        { id: "main", label: "主要", url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja" },
        { id: "finance", label: "金融", q: "金融 OR マーケット OR 投資" },
        { id: "economy", label: "世界経済", q: "世界経済 OR Bloomberg OR Reuters" },
        { id: "visa", label: "ビザ・移住", q: "デジタルノマドビザ OR 移住" },
        { id: "nomad", label: "ノマド", q: "デジタルノマド OR ワーケーション" },
        { id: "spain", label: "スペイン", q: "スペイン ニュース" },
        { id: "ai", label: "最新AI", q: "AI 最新" },
        { id: "nutrition", label: "精密栄養学", q: "精密栄養学" },
        { id: "music", label: "機能性音楽", q: "機能性音楽" },
        { id: "health", label: "健康知識", q: "健康 最新 研究" }
    ];

    let currentTab = "main";
    const userChart = { shi: ["未", "亥", "未"] };

    // --- 正確な干支計算ロジック ---
    function getDailyKanshi(date) {
        // 2000年1月1日は「戊午」(54番)
        const anchor = new Date(2000, 0, 1);
        const d1 = Date.UTC(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());
        const d2 = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
        const diffDays = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
        const idx = (diffDays + 54) % 60;
        return KANSHI[idx < 0 ? idx + 60 : idx];
    }

    function analyzeIsoho(dailyKanshi) {
        const dShi = dailyKanshi[1];
        let relations = [];
        let meanings = [];
        
        userChart.shi.forEach((uShi, i) => {
            const pos = ["日", "月", "年"][i];
            
            // 支合
            const shigo = { "子":"丑","丑":"子","寅":"亥","亥":"寅","卯":"戌","戌":"卯","辰":"酉","酉":"辰","巳":"申","申":"巳","午":"未","未":"午" };
            if(shigo[uShi] === dShi) { 
                relations.push(`${pos}支と支合`); 
                meanings.push(`${pos}環境で協力者が現れたり、物事が着実にまとまる動きがあります。`); 
            }
            // 冲
            const chu = { "子":"午","午":"子","丑":"未","未":"丑","寅":"申","申":"寅","卯":"酉","酉":"卯","辰":"戌","戌":"辰","巳":"亥","亥":"巳" };
            if(chu[uShi] === dShi) { 
                relations.push(`${pos}支と対冲`); 
                meanings.push(`${pos}の場所で予期せぬ変化やリセットが起きやすく、古いものを手放す好機です。`); 
            }
            // 半会 (亥・卯・未 など)
            const groups = [["亥","卯","未"],["寅","午","戌"],["巳","酉","丑"],["申","子","辰"]];
            groups.forEach(g => {
                if(g.includes(uShi) && g.includes(dShi)) {
                    relations.push(`${pos}支と半会`);
                    meanings.push(`${pos}を中心に活動が広がり、思考や行動がダイナミックに展開します。`);
                }
            });
            // 害
            const gai = { "子":"未","未":"子","丑":"午","午":"丑","寅":"巳","巳":"寅","卯":"辰","辰":"卯","申":"亥","亥":"申","酉":"戌","戌":"酉" };
            if(gai[uShi] === dShi) {
                relations.push(`${pos}支と害`);
                meanings.push(`${pos}において心身の不一致や、ちぐはぐな感覚を覚えやすい日です。`);
            }
        });

        if(relations.length === 0) {
            relations.push("大きな波乱なし（静観）");
            meanings.push("特別な星の干渉はありません。自分自身の内側を整える、穏やかな一日です。");
        }

        document.getElementById('f-today').innerText = dailyKanshi;
        document.getElementById('f-relation').innerText = [...new Set(relations)].join(' / ');
        document.getElementById('f-meaning').innerText = [...new Set(meanings)].join(' ');
        document.getElementById('f-theme').innerText = relations.join("").includes("対冲") ? "新旧の交代、意識の方向転換" : "現状維持と丁寧な積み重ね";
        document.getElementById('f-good').innerText = "自分の感情をノートに書くこと。旬の食材を摂り、体内のリズムを整えること。";
        document.getElementById('f-warn').innerText = "無理に結論を急がないこと。違和感があれば一度立ち止まって。";
        document.getElementById('f-summary').innerText = "今日という日の風を読み、しなやかに自分を表現する一日。";
    }

    // --- 既存UIロジック ---
    function createTabs() {
        const nav = document.getElementById('tab-list');
        const content = document.getElementById('news-content');
        nav.innerHTML = ""; content.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab ${cat.id === currentTab ? 'active' : ''}`;
            btn.innerText = cat.label;
            btn.onclick = () => switchTab(cat.id);
            nav.appendChild(btn);
            const div = document.createElement('div');
            div.id = `news-list-${cat.id}`;
            div.className = `news-container ${cat.id === currentTab ? 'active' : ''}`;
            div.innerHTML = "<p style='text-align:center; padding:20px; opacity:0.6;'>更新中...</p>";
            content.appendChild(div);
        });
    }

    async function switchTab(id) {
        currentTab = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === CATEGORIES.find(c => c.id === id).label));
        document.querySelectorAll('.news-container').forEach(c => c.classList.toggle('active', c.id === `news-list-${id}`));
        await fetchNewsForCategory(id);
    }

    async function fetchNewsForCategory(id) {
        const cat = CATEGORIES.find(c => c.id === id);
        const container = document.getElementById(`news-list-${id}`);
        const rssUrl = cat.url || `https://news.google.com/rss/search?q=${encodeURIComponent(cat.q)}&hl=ja&gl=JP&ceid=JP:ja`;
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                const sorted = data.items.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                container.innerHTML = sorted.slice(0, 12).map(item => {
                    const d = new Date(item.pubDate);
                    return `<a href="${item.link}" target="_blank" class="news-card">
                        <div class="news-meta">${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}</div>
                        <div class="news-title">${item.title}</div>
                    </a>`;
                }).join('');
            }
        } catch (e) { container.innerHTML = "<p>取得失敗。</p>"; }
    }

    async function refreshAll() {
        const updateBtn = document.getElementById('update-btn');
        updateBtn.innerText = "更新中...";
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code&daily=sunrise,sunset&timezone=Asia%2FTokyo");
            const d = await res.json();
            const now = new Date();
            
            document.getElementById('temp').innerText = Math.round(d.current.temperature_2m);
            document.getElementById('sunrise-time').innerText = new Date(d.daily.sunrise[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('sunset-time').innerText = new Date(d.daily.sunset[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('display-date').innerText = (now.getMonth()+1) + "月" + now.getDate() + "日";

            const code = d.current.weather_code;
            let icon = "☀️"; let txt = "快晴";
            if (code > 1) { icon = "☁️"; txt = "曇り"; }
            if (code > 50) { icon = "🌧️"; txt = "雨"; }
            document.getElementById('weather-icon').innerText = icon;
            document.getElementById('weather-text').innerText = txt;

            const celestial = document.getElementById('celestial-body');
            const progress = (now - new Date(d.daily.sunrise[0])) / (new Date(d.daily.sunset[0]) - new Date(d.daily.sunrise[0]));
            if (progress > 0 && progress < 1) {
                celestial.innerText = "☀️"; celestial.style.top = (20 + (1 - Math.sin(Math.PI * progress)) * 50) + "px";
                document.body.className = (progress < 0.1 || progress > 0.9) ? "twilight" : "day";
            } else {
                celestial.innerText = "🌙"; celestial.style.top = "30px"; document.body.className = "night";
            }

            analyzeIsoho(getDailyKanshi(now));
            await fetchNewsForCategory(currentTab);
        } catch (err) { console.log(err); }
        updateBtn.innerText = "情報を更新";
    }

    createTabs();
    refreshAll();
</script>

</body>
</html>
