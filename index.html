<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Briefing Desk</title>
    <style>
        :root { 
            --bg-color: #050a14; 
            --moon-gold: #f3e5ab; 
            --accent: #d4af37;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --card-bg: rgba(22, 27, 34, 0.8);
        }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; 
            background: var(--bg-color);
            background-image: radial-gradient(circle at 80% 10%, #1a2a44 0%, transparent 40%);
            color: var(--text-main); 
            margin: 0; padding: 15px; line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { position: relative; padding: 20px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 20px; }
        .moon { position: absolute; right: 0; top: 15px; width: 45px; height: 45px; background: var(--moon-gold); border-radius: 50%; box-shadow: 0 0 20px var(--moon-gold); }
        h1 { margin: 0; font-size: 1.3rem; color: var(--moon-gold); }
        .date-row { font-size: 0.9rem; font-weight: bold; color: var(--text-main); margin-top: 5px; }
        .weather-row { display: flex; align-items: center; gap: 15px; margin-top: 8px; }
        .temp { font-size: 1.8rem; font-weight: bold; color: #fff; }

        /* 更新ボタン：確実に見えるように調整 */
        .refresh-nav { text-align: center; margin: 25px 0; }
        #refresh-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        #refresh-btn:hover { background: var(--accent); color: var(--bg-color); box-shadow: 0 0 20px var(--accent); }

        /* 算命学セクション */
        .fortune-card {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .fortune-label { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #30363d; }
        .star-name { font-size: 1.4rem; color: var(--moon-gold); font-weight: bold; margin-bottom: 8px; display: block; }
        .fortune-desc { font-size: 1rem; color: #fff; }

        /* ニュースセクション */
        .news-label { font-size: 0.85rem; color: var(--accent); margin-bottom: 15px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .news-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            text-decoration: none;
            display: block;
            transition: 0.2s;
        }
        .news-item:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .news-source { font-size: 0.7rem; color: #58a6ff; font-weight: bold; margin-bottom: 5px; }
        .news-title { font-size: 1rem; color: var(--text-main); margin: 0; line-height: 1.4; }

        footer { text-align: center; font-size: 0.7rem; color: var(--text-dim); margin-top: 50px; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="moon"></div>
        <h1>MOONLIGHT BRIEFING</h1>
        <div id="display-date" class="date-row">--月--日</div>
        <div class="weather-row">
            <div id="temp" class="temp">--°C</div>
            <div id="weather-text" style="font-size: 0.85rem; color: var(--text-dim);">Tokyo Loading...</div>
        </div>
    </header>

    <div class="refresh-nav">
        <button id="refresh-btn" onclick="refreshAll()">最新ニュースに更新</button>
    </div>

    <div class="fortune-card">
        <div class="fortune-label">今日の算命学鑑定（日干：辛）</div>
        <div id="star-title" class="star-name">主星算出中...</div>
        <div id="star-desc" class="fortune-desc">読み込み中...</div>
    </div>

    <div class="news-label">主要ニュース（日本語版）</div>
    <div id="news-feed">ニュースを取得中...</div>

    <footer>
        1979.11.30 Male / Blood Type A<br>
        Source: Bloomberg, NHK, Reuters, CNN, Google News
    </footer>
</div>

<script>
    // 算命学ロジック (1979.11.30生まれ専用)
    function calculateDailyStar() {
        const today = new Date();
        const baseDate = new Date(2024, 0, 1);
        const diffDays = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
        const starIndex = (diffDays + 5) % 10;

        const stars = [
            { name: "貫索星", desc: "自分を貫く日。宝石（辛）としての誇りを持ち、他人に流されない決断が吉です。" },
            { name: "石門星", desc: "和合の日。仲間と協力し、宝石の輝きを周囲に分け与えるような交流が運気を上げます。" },
            { name: "鳳閣星", desc: "伝達の日。自然体で過ごし、美味しいものを食べて、感性をリラックスさせてください。" },
            { name: "調舒星", desc: "孤独と芸術の日。一人で静かに自分を磨き、内面的な美しさを追求するのに最適です。" },
            { name: "禄存星", desc: "奉仕と回転財。周囲に愛情を注ぐことで、巡り巡ってあなたに大きな光が還ります。" },
            { name: "司禄星", desc: "準備と蓄積。派手な動きより、地道な準備。宝石を丁寧に箱に納めるような慎重さが大切。" },
            { name: "車騎星", desc: "行動と前進。迷う前に動く。スピード感のある決断が、宝石に新たな磨きをかけます。" },
            { name: "牽牛星", desc: "自尊心と名誉。規律を守り、誠実に振る舞うことで、あなたの社会的価値が高まる日です。" },
            { name: "龍高星", desc: "習得と改革。新しい知識を吸収し、今までの自分を壊してアップデートするチャンス。" },
            { name: "玉堂星", desc: "知性と伝統。古典や歴史に触れたり、目上の人の教えを聞くことで深い安らぎが得られます。" }
        ];

        document.getElementById('star-title').innerText = stars[starIndex].name;
        document.getElementById('star-desc').innerText = stars[starIndex].desc;
        document.getElementById('display-date').innerText = (today.getMonth() + 1) + "月" + today.getDate() + "日";
    }

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code");
            const data = await res.json();
            document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°C";
            const weatherCodes = { 0: "快晴", 1: "晴れ", 2: "時々曇り", 3: "曇り", 61: "雨", 95: "雷雨" };
            document.getElementById('weather-text').innerText = "東京 / " + (weatherCodes[data.current.weather_code] || "Fair");
        } catch(e) {}
    }

    async function fetchNews() {
        const btn = document.getElementById('refresh-btn');
        btn.innerText = "更新中...";
        const sources = [
            { name: "Bloomberg 経済", url: "https://news.google.com/rss/search?q=source:Bloomberg+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "Google 国際情勢", url: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=ja&gl=JP&ceid=JP:ja" },
            { name: "Reuters 日本語", url: "https://news.google.com/rss/search?q=source:Reuters+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "NHK 主要ニュース", url: "https://www3.nhk.or.jp/rss/news/cat0.xml" }
        ];
        
        let allNews = [];
        for (const s of sources) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}`);
                const data = await res.json();
                if (data.status === 'ok') {
                    data.items.slice(0, 3).forEach(item => {
                        allNews.push({ source: s.name, title: item.title, link: item.link, time: new Date(item.pubDate) });
                    });
                }
            } catch (e) {}
        }
        allNews.sort((a, b) => b.time - a.time);
        document.getElementById('news-feed').innerHTML = allNews.map(n => `
            <a href="${n.link}" target="_blank" class="news-item">
                <div class="news-source">${n.source}</div>
                <p class="news-title">${n.title}</p>
            </a>
        `).join('');
        btn.innerText = "最新ニュースに更新";
    }

    function refreshAll() {
        calculateDailyStar();
        fetchWeather();
        fetchNews();
    }

    // 初回起動
    refreshAll();
</script>
</body>
</html>
