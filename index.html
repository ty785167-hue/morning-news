<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Intelligence Desk</title>
    <style>
        :root { 
            --bg-color: #0a1128; 
            --sun-color: #ff9d00;
            --sun-glow: #ff7e5f;
            --accent: #feb47b;
            --text-main: #e1e8f0;
            --text-dim: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; 
            background: var(--bg-color);
            background-image: linear-gradient(180deg, #0a1128 0%, #1e293b 100%);
            color: var(--text-main); 
            margin: 0; padding: 15px; line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* 太陽のデザインを入れたヘッダー */
        header { 
            position: relative;
            padding: 25px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(254, 180, 123, 0.3);
        }
        .sun {
            position: absolute;
            right: 0;
            top: 20px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, var(--sun-color), var(--sun-glow));
            border-radius: 50%;
            box-shadow: 0 0 30px var(--sun-glow);
        }
        h1 { margin: 0; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; text-shadow: 0 0 10px rgba(255, 126, 95, 0.4); }
        .date-row { font-size: 1rem; font-weight: bold; margin-top: 5px; color: #fff; }

        /* 天気と太陽の時刻 */
        .astro-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .astro-item { flex: 1; min-width: 120px; }
        .astro-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .astro-value { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .temp { font-size: 2rem; font-weight: bold; color: var(--sun-color); }

        /* 更新ボタン */
        .refresh-nav { text-align: center; margin: 25px 0; }
        #refresh-btn {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            border: none;
            color: #fff;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 126, 95, 0.4);
            transition: 0.3s;
        }
        #refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 126, 95, 0.6); }

        /* 射手座の占いカード */
        .zodiac-card {
            background: var(--card-bg);
            border: 1px solid var(--sun-glow);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border-left: 5px solid var(--sun-color);
        }
        .zodiac-label { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        .zodiac-name { font-size: 1.4rem; color: #fff; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .fortune-text { font-size: 1rem; color: var(--text-main); }

        /* ニュースセクション */
        .news-label { font-size: 0.85rem; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; font-weight: bold; }
        .news-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        .news-item:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }
        .news-source { font-size: 0.7rem; color: #58a6ff; font-weight: bold; margin-bottom: 6px; }
        .news-title { font-size: 1.05rem; color: var(--text-main); margin: 0; line-height: 1.5; }

        footer { text-align: center; font-size: 0.7rem; color: var(--text-dim); margin-top: 50px; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="sun"></div>
        <h1>SUNRISE BRIEFING</h1>
        <div id="display-date" class="date-row">--月--日</div>
        
        <div class="astro-panel">
            <div class="astro-item">
                <span class="astro-label">今の東京</span>
                <div id="temp" class="temp">--°C</div>
                <div id="weather-text" style="font-size: 0.8rem;">Loading...</div>
            </div>
            <div class="astro-item">
                <span class="astro-label">本日の日没</span>
                <div id="sunset-time" class="astro-value">--:--</div>
            </div>
            <div class="astro-item">
                <span class="astro-label">明日の日の出</span>
                <div id="sunrise-time" class="astro-value">--:--</div>
            </div>
        </div>
    </header>

    <div class="refresh-nav">
        <button id="refresh-btn" onclick="refreshAll()">最新情報を取得</button>
    </div>

    <!-- 射手座 占い -->
    <div class="zodiac-card">
        <div class="zodiac-label">SAGITTARIUS DAILY FORTUNE</div>
        <div class="zodiac-name">🏹 射手座 (11/30)</div>
        <div id="fortune-text" class="fortune-text">星の配置を読み解いています...</div>
    </div>

    <div class="news-label">主要ニュース (経済・国際)</div>
    <div id="news-feed">ニュースを読み込み中...</div>

    <footer>
        1979.11.30 Male / Sagittarius / Blood Type A<br>
        Astronomy Data: Open-Meteo / News: Google, Bloomberg, Reuters
    </footer>
</div>

<script>
    // 射手座専用の占いロジック
    function updateFortune() {
        const today = new Date();
        const cycle = (today.getFullYear() + today.getMonth() + today.getDate()) % 7;
        const fortunes = [
            "【絶好調】冒険心が幸運を呼びます。直感に従って、新しい知識や場所へ飛び込んでみて。",
            "【知的好奇心】学びが深まる日。気になっていた専門誌を読んだり、新しいスキルに触れると吉。",
            "【対人運】あなたの楽観的な言葉が周囲を救います。リーダーシップを発揮する場面があるかも。",
            "【調整】少しペースを落として。明日の飛躍のために、自由な時間を作って心身を解放しましょう。",
            "【金運・実力】コツコツと進めてきたことが評価されます。経済的なニュースにチャンスあり。",
            "【直感冴える】哲学的な気づきがある日。物事の本質を見抜く力が強まっています。",
            "【交流】遠方の友人と連絡を取ると良い刺激が。広い視野を持つことで、悩みが解決に向かいます。"
        ];
        document.getElementById('fortune-text').innerText = fortunes[cycle];
        document.getElementById('display-date').innerText = (today.getMonth() + 1) + "月" + today.getDate() + "日";
    }

    // 天気と天文情報（日の出・日没）を取得
    async function fetchAstroData() {
        try {
            // 東京（北緯35.68, 東経139.76）のデータを取得
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code&daily=sunrise,sunset&timezone=Asia%2FTokyo");
            const data = await res.json();
            
            // 気温
            document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°C";
            const weatherCodes = { 0: "快晴", 1: "晴れ", 2: "時々曇り", 3: "曇り", 61: "雨", 95: "雷雨" };
            document.getElementById('weather-text').innerText = (weatherCodes[data.current.weather_code] || "Fair");

            // 日没（今日）
            const sunset = new Date(data.daily.sunset[0]);
            document.getElementById('sunset-time').innerText = sunset.getHours() + ":" + sunset.getMinutes().toString().padStart(2, '0');

            // 日の出（明日）
            const sunrise = new Date(data.daily.sunrise[1]);
            document.getElementById('sunrise-time').innerText = sunrise.getHours() + ":" + sunrise.getMinutes().toString().padStart(2, '0');
        } catch(e) {
            console.error(e);
        }
    }

    async function fetchNews() {
        const btn = document.getElementById('refresh-btn');
        const feed = document.getElementById('news-feed');
        btn.innerText = "更新中...";
        
        const sources = [
            { name: "Bloomberg 経済", url: "https://news.google.com/rss/search?q=source:Bloomberg+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "Google 国際情勢", url: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=ja&gl=JP&ceid=JP:ja" },
            { name: "Reuters 日本語", url: "https://news.google.com/rss/search?q=source:Reuters+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "NHK 主要ニュース", url: "https://www3.nhk.or.jp/rss/news/cat0.xml" }
        ];
        
        let allNews = [];
        for (const s of sources) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}`);
                const data = await res.json();
                if (data.status === 'ok') {
                    data.items.slice(0, 3).forEach(item => {
                        allNews.push({ source: s.name, title: item.title, link: item.link, time: new Date(item.pubDate) });
                    });
                }
            } catch (e) {}
        }
        allNews.sort((a, b) => b.time - a.time);
        feed.innerHTML = allNews.map(n => `
            <a href="${n.link}" target="_blank" class="news-item">
                <div class="news-source">${n.source}</div>
                <p class="news-title">${n.title}</p>
            </a>
        `).join('');
        btn.innerText = "最新情報を取得";
    }

    function refreshAll() {
        updateFortune();
        fetchAstroData();
        fetchNews();
    }

    // 初回起動
    refreshAll();
</script>
</body>
</html>
