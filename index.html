<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Briefing Desk</title>
    <style>
        :root { 
            --accent: #ffd700;
            --card-bg: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            margin: 0; padding: 10px; line-height: 1.5;
            min-height: 100vh; transition: background 3s ease; color: #fff;
            background: #050a14;
        }

        /* 空の状態 */
        body.day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #003366; }
        body.twilight { background: linear-gradient(180deg, #fa709a 0%, #fee140 100%); color: #4a0000; }
        body.night { background: linear-gradient(180deg, #050a14 0%, #1a2a44 100%); color: #ffffff; }

        .container { max-width: 800px; margin: 0 auto; }
        
        header { position: relative; padding: 50px 0 20px; text-align: center; }
        #celestial-body { position: absolute; left: 50%; transform: translateX(-50%); font-size: 60px; transition: all 3s ease; z-index: 0; }

        .info-panel { 
            position: relative; z-index: 1; background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .temp-main { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .astro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.8rem; margin-top: 10px; opacity: 0.9; }

        .fortune-area { background: rgba(0,0,0,0.15); padding: 15px; border-radius: 15px; margin: 15px 0; border-left: 5px solid var(--accent); }

        /* カテゴリータブ */
        .category-nav { 
            display: flex; overflow-x: auto; gap: 8px; padding: 15px 0;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .tab { 
            flex: 0 0 auto; padding: 10px 20px; border-radius: 25px; 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: inherit; cursor: pointer; font-size: 0.85rem; font-weight: bold;
        }
        .tab.active { background: #fff; color: #000; border-color: #fff; }

        /* ニュース表示エリア */
        .news-container { display: none; min-height: 200px; }
        .news-container.active { display: block; }
        .news-card {
            background: rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 15px; margin-bottom: 10px; text-decoration: none;
            color: inherit; display: block; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .news-card:hover { background: rgba(255, 255, 255, 0.2); }
        .news-meta { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; font-weight: bold; }

        footer { text-align: center; font-size: 0.7rem; padding: 40px 0; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="celestial-body">☀️</div>
        <div class="info-panel">
            <div id="display-date" style="font-size: 1.1rem; font-weight: bold;">--月--日</div>
            <div class="temp-main"><span id="temp">--</span>°C <span id="weather-icon">--</span></div>
            <div id="weather-text" style="font-size: 0.9rem;">Loading Sky...</div>
            <div class="astro-grid">
                <div>🌅 Sunrise: <span id="sunrise-time">--:--</span></div>
                <div>🌇 Sunset: <span id="sunset-time">--:--</span></div>
            </div>
        </div>
    </header>

    <div class="fortune-area">
        <div style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">🏹 射手座 (11/30) 運勢</div>
        <div id="fortune-text">運勢を取得中...</div>
    </div>

    <div style="text-align:center;"><button onclick="refreshAll()" id="update-btn" style="background:none; border:1px solid currentColor; color:inherit; padding:8px 25px; border-radius:20px; cursor:pointer; font-size:0.9rem; font-weight:bold;">更新する</button></div>

    <div class="category-nav" id="tab-list"></div>
    <div id="news-content"></div>

    <footer>
        1979.11.30 / Sagittarius / Tokyo Office<br>
        Powered by Open-Meteo & Google News RSS
    </footer>
</div>

<script>
    const CATEGORIES = [
        { id: "main", label: "主要", url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja" },
        { id: "economy", label: "世界経済", q: "世界経済 OR Bloomberg OR Reuters" },
        { id: "japan", label: "日本国内", q: "日本国内 ニュース" },
        { id: "spain", label: "スペイン", q: "スペイン ニュース" },
        { id: "nomad", label: "ノマド", q: "デジタルノマド OR ワーケーション" },
        { id: "ai", label: "最新AI", q: "AI 最新 OR 人工知能" },
        { id: "nutrition", label: "精密栄養学", q: "精密栄養学 OR パーソナライズ栄養" },
        { id: "music", label: "機能性音楽", q: "機能性音楽 OR 音楽療法 研究" },
        { id: "health", label: "健康知識", q: "健康 最新 研究" }
    ];

    let currentTab = "main";

    function createTabs() {
        const nav = document.getElementById('tab-list');
        const content = document.getElementById('news-content');
        nav.innerHTML = "";
        content.innerHTML = "";

        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab ${cat.id === currentTab ? 'active' : ''}`;
            btn.innerText = cat.label;
            btn.onclick = () => switchTab(cat.id);
            nav.appendChild(btn);

            const div = document.createElement('div');
            div.id = `news-list-${cat.id}`;
            div.className = `news-container ${cat.id === currentTab ? 'active' : ''}`;
            div.innerHTML = "<p style='text-align:center; padding:20px; opacity:0.6;'>ニュースを読み込み中...</p>";
            content.appendChild(div);
        });
    }

    async function switchTab(id) {
        currentTab = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.news-container').forEach(c => c.classList.remove('active'));
        
        const activeTabBtn = Array.from(document.querySelectorAll('.tab')).find(t => t.innerText === CATEGORIES.find(c => c.id === id).label);
        if(activeTabBtn) activeTabBtn.classList.add('active');
        
        const activeContent = document.getElementById(`news-list-${id}`);
        if(activeContent) activeContent.classList.add('active');
        
        await fetchNewsForCategory(id);
    }

    async function fetchNewsForCategory(id) {
        const cat = CATEGORIES.find(c => c.id === id);
        const container = document.getElementById(`news-list-${id}`);
        
        // GoogleニュースのURLを生成
        let rssUrl = cat.url;
        if (!rssUrl) {
            rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(cat.q)}&hl=ja&gl=JP&ceid=JP:ja`;
        }

        try {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            const res = await fetch(apiUrl);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                container.innerHTML = data.items.slice(0, 10).map(item => `
                    <a href="${item.link}" target="_blank" class="news-card">
                        <div class="news-meta">${item.pubDate.split(' ')[0]} | ${item.author || 'News'}</div>
                        <div class="news-title">${item.title}</div>
                    </a>
                `).join('');
            } else {
                container.innerHTML = "<p style='text-align:center; padding:20px;'>現在、表示できるニュースがありません。</p>";
            }
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>取得に失敗しました。時間をおいて「更新」を押してください。</p>";
        }
    }

    async function refreshAll() {
        const updateBtn = document.getElementById('update-btn');
        updateBtn.innerText = "更新中...";

        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code&daily=sunrise,sunset&timezone=Asia%2FTokyo");
            const d = await res.json();
            
            const now = new Date();
            const sunrise = new Date(d.daily.sunrise[0]);
            const sunset = new Date(d.daily.sunset[0]);
            
            document.getElementById('temp').innerText = Math.round(d.current.temperature_2m);
            document.getElementById('sunrise-time').innerText = sunrise.getHours() + ":" + sunrise.getMinutes().toString().padStart(2, '0');
            document.getElementById('sunset-time').innerText = sunset.getHours() + ":" + sunset.getMinutes().toString().padStart(2, '0');
            document.getElementById('display-date').innerText = (now.getMonth()+1) + "月" + now.getDate() + "日";

            const code = d.current.weather_code;
            let icon = "☀️"; let txt = "快晴";
            if (code > 1) { icon = "☁️"; txt = "曇り"; }
            if (code > 50) { icon = "🌧️"; txt = "雨"; }
            document.getElementById('weather-icon').innerText = icon;
            document.getElementById('weather-text').innerText = txt;

            const celestial = document.getElementById('celestial-body');
            if (now > sunrise && now < sunset) {
                const progress = (now - sunrise) / (sunset - sunrise);
                celestial.innerText = "☀️";
                celestial.style.top = (20 + (1 - Math.sin(Math.PI * progress)) * 50) + "px";
                document.body.className = (progress < 0.1 || progress > 0.9) ? "twilight" : "day";
            } else {
                celestial.innerText = "🌙";
                celestial.style.top = "30px";
                document.body.className = "night";
            }

            const cycle = (now.getDate()) % 5;
            const fts = ["【最高】冒険心が道を切り拓く日。","【知性】学びが深い。ニュースから着想を。","【交流】人との会話に幸運のヒントが。","【慎重】一歩引いて全体を眺めると吉。","【休息】自分を労り、感性を満たして。"];
            document.getElementById('fortune-text').innerText = fts[cycle];

            await fetchNewsForCategory(currentTab);
        } catch (err) {
            console.log(err);
        }
        updateBtn.innerText = "更新する";
    }

    createTabs();
    refreshAll();
</script>

</body>
</html>
