<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Briefing Desk - 1979.11.30</title>
    <style>
        :root { --bg-color: #0d1117; --card-bg: #161b22; --text-main: #c9d1d9; --text-dim: #8b949e; --accent: #d4af37; --link: #58a6ff; --news-border: #30363d; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* ヘッダー */
        header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); letter-spacing: 1.5px; }
        .weather { text-align: right; }
        .temp { font-size: 1.6rem; font-weight: bold; }
        .weather-info { font-size: 0.8rem; color: var(--text-dim); }

        /* 算命学カード：日干「辛」の宝石エネルギー */
        .fortune-card { background: linear-gradient(145deg, #1c2128, #161b22); border: 1.5px solid var(--accent); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .fortune-card::before { content: "💎"; position: absolute; right: 10px; top: 10px; font-size: 3rem; opacity: 0.1; }
        .fortune-header { font-size: 0.8rem; color: var(--accent); font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-transform: uppercase; }
        .fortune-main { font-size: 1.1rem; font-weight: bold; line-height: 1.6; color: #fff; }

        /* ニュースセクション */
        .section-label { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin: 25px 0 12px; padding-left: 10px; border-left: 4px solid var(--accent); }
        .news-item { background: var(--card-bg); border: 1px solid var(--news-border); border-radius: 10px; padding: 16px; margin-bottom: 14px; text-decoration: none; display: block; transition: all 0.2s ease; }
        .news-item:hover { border-color: var(--accent); background: #1c2128; transform: translateY(-2px); }
        .news-source { font-size: 0.75rem; font-weight: bold; color: var(--link); margin-bottom: 6px; display: flex; align-items: center; }
        .news-source::before { content: "●"; margin-right: 6px; font-size: 0.6rem; }
        .news-headline { font-size: 1rem; font-weight: 500; color: var(--text-main); margin: 0; line-height: 1.5; }
        .news-time { font-size: 0.7rem; color: var(--text-dim); margin-top: 10px; text-align: right; }

        footer { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-top: 50px; padding-bottom: 30px; border-top: 1px solid #30363d; padding-top: 20px; }
        .loading { text-align: center; color: var(--text-dim); padding: 40px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="today-date">--月--日</h1>
            <div style="font-size: 0.8rem; color: var(--text-dim);">1979.11.30 生まれ（辛未）</div>
        </div>
        <div class="weather">
            <div id="temp-display" class="temp">--°C</div>
            <div id="weather-desc" class="weather-info">Tokyo</div>
        </div>
    </header>

    <!-- 算命学セクション：日干「辛」は宝石。磨いて輝く運命 -->
    <div class="fortune-card">
        <div class="fortune-header">今日の算命学鑑定（辛の主）</div>
        <div id="fortune-text" class="fortune-main">天のエネルギーを解析中...</div>
    </div>

    <div id="news-section">
        <div class="section-label">世界・経済 優先ニュース</div>
        <div id="news-feed" class="loading">世界のニュースを収集中...</div>
    </div>

    <footer>
        1時間ごとに自動更新<br>
        Sources: NHK, Reuters JP, Bloomberg, CNN JP, Google World News
    </footer>
</div>

<script>
    // 算命学ロジック：日干「辛（しん）」の宝石に特化した今日の運勢
    function updateFortune() {
        const today = new Date();
        document.getElementById('today-date').innerText = `${today.getMonth() + 1}月${today.getDate()}日`;

        // 日ごとのバイオリズム
        const cycle = (today.getFullYear() + today.getMonth() + today.getDate()) % 6;
        const fortunes = [
            "【洗練】宝石の純度が上がる日。余計なものを削ぎ落とし、本質に集中すると大きな成果が出ます。",
            "【反射】周囲の光を受け、あなたが輝く日。社交の場に幸運があります。新しい出会いを大切に。",
            "【研磨】自分を磨く試練の日。少しの苦労が後の輝きを約束します。今は忍耐と努力が吉。",
            "【展示】あなたの才能が表舞台に出る日。プレゼンや発表には最適のタイミングです。",
            "【休息】宝石をケースに休める時。自分を労り、プライベートを充実させるとエネルギーが充填されます。",
            "【創造】新しい輝きを見つける日。趣味や創作活動から、将来のビジネスのヒントが得られそう。"
        ];
        document.getElementById('fortune-text').innerText = fortunes[cycle];
    }

    async function updateWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code");
            const data = await res.json();
            document.getElementById('temp-display').innerText = Math.round(data.current.temperature_2m) + "°C";
            const weatherMap = { 0: "快晴", 1: "晴れ", 2: "時々曇り", 3: "曇り", 45: "霧", 61: "雨", 95: "雷雨" };
            document.getElementById('weather-desc').innerText = "東京 / " + (weatherMap[data.current.weather_code] || "Fair");
        } catch (e) {}
    }

    async function updateNews() {
        const sources = [
            { name: "Bloomberg 経済", url: "https://news.google.com/rss/search?q=source:Bloomberg+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "国際情勢 (Google)", url: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=ja&gl=JP&ceid=JP:ja" },
            { name: "Reuters 日本版", url: "https://news.google.com/rss/search?q=source:Reuters+hl:ja&hl=ja&gl=JP&ceid=JP:ja" },
            { name: "NHK 主要ニュース", url: "https://www3.nhk.or.jp/rss/news/cat0.xml" },
            { name: "CNN 国際ニュース", url: "https://news.google.com/rss/search?q=source:CNN+hl:ja&hl=ja&gl=JP&ceid=JP:ja" }
        ];
        
        const feed = document.getElementById('news-feed');
        let allNews = [];

        for (const s of sources) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}`);
                const data = await res.json();
                if (data.status === 'ok') {
                    // 各メディアから最新の上位2-3件を取得
                    data.items.slice(0, 3).forEach(item => {
                        allNews.push({ source: s.name, title: item.title, link: item.link, time: new Date(item.pubDate) });
                    });
                }
            } catch (e) {}
        }
        
        // 全ニュースを最新順にソート
        allNews.sort((a, b) => b.time - a.time);
        
        feed.innerHTML = allNews.map(n => `
            <a href="${n.link}" target="_blank" class="news-item">
                <div class="news-source">${n.source}</div>
                <p class="news-headline">${n.title}</p>
                <div class="news-time">${n.time.getHours()}:${n.time.getMinutes().toString().padStart(2, '0')}</div>
            </a>
        `).join('');
    }

    function refresh() { updateFortune(); updateWeather(); updateNews(); }
    refresh();
    setInterval(refresh, 3600000); // 1時間ごと
    window.addEventListener('focus', refresh); // タブに戻った時に最新に
</script>
</body>
</html>
