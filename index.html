<!DOCTYPE html>
<html lang="ja" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Sky Briefing</title>
    <style>
        :root { 
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --accent: #ffd700;
        }
        
        /* 時間帯による背景の変化 */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; 
            margin: 0; padding: 15px; line-height: 1.6;
            min-height: 100vh;
            transition: background 2s ease;
            color: var(--text-main);
            background: #050a14; /* デフォルトは夜 */
        }

        /* 背景バリエーション */
        body.day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #003366; }
        body.twilight { background: linear-gradient(180deg, #fa709a 0%, #fee140 100%); color: #4a0000; }
        body.night { background: linear-gradient(180deg, #050a14 0%, #1a2a44 100%); color: #ffffff; }

        .container { max-width: 650px; margin: 0 auto; }
        
        header { 
            position: relative;
            padding: 40px 0 20px;
            text-align: center;
        }

        /* 動的な太陽・月のアイコン */
        #celestial-body {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            font-size: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 2s ease-in-out;
            z-index: 0;
        }

        .info-panel {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .temp-row { font-size: 3rem; font-weight: bold; margin: 0; }
        .weather-icon { font-size: 1.5rem; vertical-align: middle; margin-left: 10px; }

        .astro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 0.85rem; }

        /* 更新ボタン */
        .refresh-nav { text-align: center; margin: 25px 0; }
        #refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid currentColor;
            color: inherit;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        #refresh-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.05); }

        /* 占い・ニュースカード */
        .card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .zodiac-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        
        .news-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .news-item:hover { background: rgba(255, 255, 255, 0.2); }
        .news-source { font-size: 0.7rem; font-weight: bold; opacity: 0.8; margin-bottom: 5px; text-transform: uppercase; }

        footer { text-align: center; font-size: 0.7rem; opacity: 0.6; padding: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="celestial-body">☀️</div>
        <div class="info-panel">
            <div id="display-date" style="font-weight: bold; letter-spacing: 2px;">--月--日</div>
            <div class="temp-row">
                <span id="temp">--</span>°C<span id="weather-icon" class="weather-icon">--</span>
            </div>
            <div id="weather-text">Loading Weather...</div>
            
            <div class="astro-grid">
                <div>🌅 日の出: <span id="sunrise-time">--:--</span></div>
                <div>🌇 日没: <span id="sunset-time">--:--</span></div>
            </div>
        </div>
    </header>

    <div class="refresh-nav">
        <button id="refresh-btn" onclick="refreshAll()">最新ニュースに更新</button>
    </div>

    <div class="card">
        <div class="zodiac-title">🏹 射手座 (11/30) 今日の運勢</div>
        <div id="fortune-text">Loading Fortune...</div>
    </div>

    <div style="font-size: 0.8rem; font-weight: bold; margin: 20px 0 10px; opacity: 0.8; letter-spacing: 1px;">WORLD & ECONOMY NEWS</div>
    <div id="news-feed"></div>

    <footer>
        1979.11.30 Male / Sagittarius<br>
        Open-Meteo API / Google & Bloomberg News
    </footer>
</div>

<script>
    // 天候コードをアイコンに変換
    function getWeatherInfo(code) {
        if (code <= 1) return { icon: "☀️", text: "快晴" };
        if (code <= 3) return { icon: "☁️", text: "曇り" };
        if (code <= 48) return { icon: "🌫️", text: "霧" };
        if (code <= 67) return { icon: "🌧️", text: "雨" };
        if (code <= 77) return { icon: "❄️", text: "雪" };
        if (code <= 82) return { icon: "🌦️", text: "にわか雨" };
        return { icon: "⛈️", text: "雷雨" };
    }

    async function refreshAll() {
        const btn = document.getElementById('refresh-btn');
        btn.innerText = "更新中...";
        
        try {
            // 1. 天気・天文データ取得
            const weatherRes = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code&daily=sunrise,sunset&timezone=Asia%2FTokyo");
            const wData = await weatherRes.json();
            
            const now = new Date();
            const sunrise = new Date(wData.daily.sunrise[0]);
            const sunset = new Date(wData.daily.sunset[0]);
            const temp = Math.round(wData.current.temperature_2m);
            const wInfo = getWeatherInfo(wData.current.weather_code);

            // 表示更新
            document.getElementById('temp').innerText = temp;
            document.getElementById('weather-icon').innerText = wInfo.icon;
            document.getElementById('weather-text').innerText = wInfo.text;
            document.getElementById('display-date').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日";
            document.getElementById('sunrise-time').innerText = sunrise.getHours() + ":" + sunrise.getMinutes().toString().padStart(2, '0');
            document.getElementById('sunset-time').innerText = sunset.getHours() + ":" + sunset.getMinutes().toString().padStart(2, '0');

            // 2. ビジュアルの動的変化（太陽・月・背景）
            const body = document.body;
            const celestial = document.getElementById('celestial-body');
            
            if (now > sunrise && now < sunset) {
                // 昼間
                const totalDaylight = sunset - sunrise;
                const progress = (now - sunrise) / totalDaylight; // 0 to 1
                
                // 太陽の高さ（放物線）
                celestial.innerText = "☀️";
                celestial.style.top = (20 + (1 - Math.sin(Math.PI * progress)) * 40) + "px";
                
                if (progress < 0.1 || progress > 0.9) {
                    body.className = "twilight";
                } else {
                    body.className = "day";
                }
            } else {
                // 夜
                body.className = "night";
                celestial.innerText = "🌙";
                celestial.style.top = "30px";
            }

            // 3. 占い
            const cycle = (now.getFullYear() + now.getMonth() + now.getDate()) % 5;
            const fortunes = [
                "【絶好調】新しい挑戦が実を結ぶ日。直感を信じて進んでください。",
                "【知的好奇心】学びが深まる日。ニュースの裏側を読むと発見があります。",
                "【対人運】あなたの楽観的な言葉が周囲に光を与えます。交流を楽しんで。",
                "【調整】一歩引いて全体を見る日。落ち着いた判断が大きなミスを防ぎます。",
                "【充実】自分へのご褒美を。好きな音楽や食事で感性を満たしましょう。"
            ];
            document.getElementById('fortune-text').innerText = fortunes[cycle];

            // 4. ニュース取得
            const newsRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent("https://news.google.com/rss/search?q=source:Bloomberg+OR+source:Reuters+OR+source:NHK&hl=ja&gl=JP&ceid=JP:ja")}`);
            const nData = await newsRes.json();
            
            document.getElementById('news-feed').innerHTML = nData.items.slice(0, 15).map(item => `
                <a href="${item.link}" target="_blank" class="news-item">
                    <div class="news-source">${item.title.split(' - ')[1] || 'NEWS'}</div>
                    <p class="title">${item.title.split(' - ')[0]}</p>
                </a>
            `).join('');

        } catch (e) {
            console.error(e);
        }
        btn.innerText = "最新ニュースに更新";
    }

    refreshAll();
    // 30分ごとに自動更新
    setInterval(refreshAll, 1800000);
</script>

</body>
</html>
